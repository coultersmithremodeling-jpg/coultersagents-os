function initiateOAuth(provider) {
  const config = OAUTH_CONFIG[provider];
  if (!config || !config.authUrl) { showNotif(`${config?.name||provider} requires backend setup.`); return; }
  if (!config.clientId) { showNotif(`OAuth not configured for ${config.name}. Add Client ID.`); return; }
  const redirectUri = `${OAUTH_CALLBACK_BASE}${config.redirectPath}?user_id=${currentUser?.id||''}`;
  const state = crypto.randomUUID();
  const url = `${config.authUrl}?client_id=${config.clientId}&redirect_uri=${encodeURIComponent(redirectUri)}&scope=${encodeURIComponent(config.scope)}&response_type=code&state=${state}`;
  localStorage.setItem('oauth_state_'+provider, state);
  const w=600,h=700,l=(screen.width-w)/2,t=(screen.height-h)/2;
  const popup = window.open(url,`${config.name} Auth`,`width=${w},height=${h},left=${l},top=${t}`);
  const listener = setInterval(()=>{
    try{if(popup.closed){clearInterval(listener);return;}}catch(e){clearInterval(listener);setTimeout(()=>loadIntgState(),1000);}
  },500);
}

async function resolveSession(){
  const fill=document.getElementById('bootBarFill');
  const txt=document.getElementById('bootText');
  fill.style.width='30%';txt.textContent='Resolving session...';
  try{
    // Race getSession against a 5s timeout
    const sessionResult = await Promise.race([
      sb.auth.getSession(),
      new Promise((_,reject)=>setTimeout(()=>reject(new Error('timeout')),5000))
    ]);
    const{data:{session}}=sessionResult;
    fill.style.width='60%';txt.textContent='Session resolved.';
    if(session?.user){
      currentUser=session.user;
      fill.style.width='80%';txt.textContent='Loading profile...';
      await loadProfile(session.user.id);
      fill.style.width='100%';txt.textContent='Welcome back.';
    }else{
      fill.style.width='100%';txt.textContent='Ready.';
    }
  }catch(e){
    console.warn('Session resolve error:',e.message);
    fill.style.width='100%';txt.textContent='Ready.';
  }
  // Always hide boot
  if(!bootResolved){bootResolved=true;setTimeout(hideBoot,200);}
}

function addChatBubble(role,text,time){const c=document.getElementById('chatMessages');const d=document.createElement('div');d.className='chat-msg '+role;const ts=time instanceof Date?time.toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'}):time;

function generateReply(msg){const lm=msg.toLowerCase();if(lm.includes('status')||lm.includes('working'))return`I'm running ${formData.services.length||0} services for ${formData.bizName}. Everything is operational. Your Senterion core is monitoring all sub-routines continuously.`;

if(lm.includes('help')||lm.includes('what'))return`I'm Senterion — your unified AI brain. I manage scheduling, phone calls, emails, marketing, support, and more. I delegate to sub-routines silently. Just tell me what you need!`;
return`Got it. As ${formData.bizName}'s AI core, I'm processing that. My sub-routines are standing by. Is there anything specific you'd like me to prioritize?`;}

}

function updateBrandGlow(){const b=getComputedStyle(document.documentElement).getPropertyValue('--brand').trim();document.documentElement.style.setProperty('--brand-glow',b.replace('#','rgba(')?b:b+'33');try{const r=parseInt(b.slice(1,3),16),g=parseInt(b.slice(3,5),16),bl=parseInt(b.slice(5,7),16);document.documentElement.style.setProperty('--brand-glow',`rgba(${r},${g},${bl},0.2)`);}catch(e){}}

function setFont(f,el){currentFont=f;const map={inter:'Inter,system-ui,sans-serif',space:'Space Grotesk,system-ui,sans-serif',outfit:'Outfit,system-ui,sans-serif',playfair:'Playfair Display,serif'};document.body.style.fontFamily=map[f]||map.inter;document.querySelectorAll('#fontRow .style-btn').forEach(b=>b.classList.remove('active'));if(el)el.classList.add('active');}

function setRadius(r,el){currentRadius=r;document.documentElement.style.setProperty('--radius',r+'px');document.documentElement.style.setProperty('--rs',Math.min(r,6)+'px');document.documentElement.style.setProperty('--rl',Math.max(r,12)+'px');document.querySelectorAll('#borderRow .style-btn').forEach(b=>b.classList.remove('active'));if(el)el.classList.add('active');}

function setPers(p,el){document.querySelectorAll('.personality-presets .preset-chip').forEach(b=>b.classList.remove('active'));if(el)el.classList.add('active');showNotif('Personality set to '+p);}

async function saveTheme(){saveThemeToDB();showNotif('&#127912; Theme saved!');}
async function saveThemeToDB(){if(!currentUser)return;try{await sb.from('profiles').update({theme:JSON.stringify({vibe:currentVibe,font:currentFont,radius:currentRadius,primary:getComputedStyle(document.documentElement).getPropertyValue('--brand').trim(),secondary:getComputedStyle(document.documentElement).getPropertyValue('--brand2').trim(),accent:getComputedStyle(document.documentElement).getPropertyValue('--accent').trim()})}).eq('id',currentUser.id);}catch(e){}}

async function saveProfile(){
  if(!currentUser)return;
  const d={business_name:document.getElementById('setBizName').value,industry:document.getElementById('setIndustry').value,phone:document.getElementById('setPhone').value,email:document.getElementById('setEmail').value};
  try{await sb.from('profiles').update(d).eq('id',currentUser.id);formData.bizName=d.business_name;formData.industry=d.industry;formData.phone=d.phone;formData.email=d.email;showNotif('&#10003; Profile saved!');}catch(e){showNotif('Error saving profile.');}
}

async function saveWebsite(){showNotif('&#10003; Website updated!');if(document.getElementById('buildOverlay').classList.contains('done'))injectSandbox();}
function exportData(){showNotif('Data export started.');}
function deleteData(){if(confirm('Delete all your data?'))showNotif('Data deletion requested.');}

// ═══ DEAL ═══
async function enterDeal(){
  if(!currentUser)return;userStatus='subscriber';
  try{await sb.from('profiles').update({status:'subscriber'}).eq('id',currentUser.id);}catch(e){}
  document.getElementById('dealCard').style.display='none';document.getElementById('dealActiveMsg').style.display='block';
  advRoadmap(3);setTimeout(()=>advRoadmap(4),500);buildAgents();logActivity('system','subscribe','Entered the deal');showNotif('&#128640; All systems online!');
}

// ═══ ADMIN ═══
function toggleAdmin(){const o=document.getElementById('adminOverlay');o.classList.toggle('show');if(o.classList.contains('show'))loadAdmin();}
async function loadAdmin(){const c=document.getElementById('adminContent');c.innerHTML='<div class="no-data"><div class="spinner"></div> Loading...</div>';
try{const{data}=await sb.from('signups').select('*').order('created_at',{ascending:false});if(!data||data.length===0){c.innerHTML='<div class="no-data">No signups yet.</div>';return;}
const total=data.length;const active=data.filter(d=>d.status==='subscriber').length;const recent=data.filter(d=>{const diff=Date.now()-new Date(d.created_at).getTime();return diff<7*86400000;}).length;
c.innerHTML=`<div class="admin-stats"><div class="admin-stat"><div class="num">${total}</div><div class="lbl">Total</div></div><div class="admin-stat"><div class="num">${active}</div><div class="lbl">Subscribers</div></div><div class="admin-stat"><div class="num">${recent}</div><div class="lbl">Last 7 Days</div></div></div><div style="overflow-x:auto"><table class="admin-table"><thead><tr><th>Name</th><th>Business</th><th>Industry</th><th>Services</th><th>Status</th><th>Date</th></tr></thead><tbody>${data.map(d=>`<tr><td>${d.first_name} ${d.last_name}</td><td>${d.business_name}</td><td>${d.industry||'-'}</td><td>${(d.services||[]).length}</td><td><span class="admin-badge">${d.status||'new'}</span></td><td>${new Date(d.created_at).toLocaleDateString()}</td></tr>`).join('')}</tbody></table></div>`;
}catch(e){c.innerHTML='<div class="no-data">Error loading data.</div>';}}

// ═══ UTILS ═══
function showNotif(msg){const n=document.getElementById('notif');n.textContent=msg;n.classList.add('show');setTimeout(()=>n.classList.remove('show'),3000);}
</script>
</body>
