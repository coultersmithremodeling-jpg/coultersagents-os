<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#050816;--bg2:#0f1629;--bg3:#151c30;--bg4:#1a2340;--brand:#06b6d4;--brand2:#8b5cf6;--brand-glow:rgba(6,182,212,.2);--accent:#10b981;--warn:#f59e0b;--danger:#ef4444;--txt:#f1f5f9;--txt2:#94a3b8;--txt3:#64748b;--brd:rgba(255,255,255,.06);--brd2:rgba(255,255,255,.12);--grad:linear-gradient(135deg,var(--brand),var(--brand2));--rs:8px;--rl:20px;--font:'Inter',system-ui,sans-serif;--radius:8px}
html{scroll-behavior:smooth}body{font-family:var(--font);background:var(--bg);color:var(--txt);line-height:1.6;overflow-x:hidden;-webkit-font-smoothing:antialiased}

.orb{position:fixed;border-radius:50%;filter:blur(100px);pointer-events:none;z-index:0}.orb1{width:500px;height:500px;background:var(--brand-glow);top:-5%;right:-5%;animation:oF 25s ease-in-out infinite}.orb2{width:400px;height:400px;background:rgba(139,92,246,.06);bottom:5%;left:-5%;animation:oF 25s ease-in-out infinite reverse}@keyframes oF{0%,100%{transform:translate(0,0)}50%{transform:translate(40px,-30px)}}
#bootOverlay{position:fixed;inset:0;background:var(--bg);z-index:99999;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:18px;transition:opacity .4s}#bootOverlay.hidden{opacity:0;pointer-events:none}
.boot-logo{font-size:36px;font-weight:900;letter-spacing:-2px;animation:bP 1s ease-in-out infinite}.boot-logo span{color:var(--brand)}@keyframes bP{0%,100%{opacity:1}50%{opacity:.3}}
.boot-bar{width:280px;height:4px;background:var(--bg3);border-radius:2px;overflow:hidden}.boot-fill{height:100%;background:var(--grad);width:0%;transition:width .3s}

nav{position:fixed;top:0;width:100%;height:60px;background:rgba(5,8,22,.9);backdrop-filter:blur(16px);border-bottom:1px solid var(--brd);z-index:1000;display:flex;align-items:center}
.nav-in{max-width:1400px;width:100%;margin:0 auto;padding:0 20px;display:flex;align-items:center;justify-content:space-between}
.logo{display:flex;align-items:center;gap:10px;cursor:pointer;text-decoration:none;color:var(--txt)}.logo-box{width:32px;height:32px;background:var(--grad);border-radius:var(--radius);display:flex;align-items:center;justify-content:center;font-weight:900;font-size:11px;color:#fff}.logo-txt{font-size:18px;font-weight:800;letter-spacing:-.5px}.logo-txt span{color:var(--brand)}
.nav-links{display:flex;gap:20px;align-items:center;list-style:none}.nav-links a,.nav-links button{color:var(--txt2);text-decoration:none;font-size:13px;font-weight:500;transition:.2s;background:none;border:none;cursor:pointer;font-family:inherit}.nav-links a:hover,.nav-links button:hover{color:var(--brand)}

.nav-user-wrap{position:relative;display:flex;align-items:center;gap:10px}.nav-avatar{width:30px;height:30px;border-radius:var(--radius);background:var(--grad);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:900;color:#fff;cursor:pointer}.nav-username{font-size:12px;font-weight:700;cursor:pointer}

.nav-dd-item{display:flex;align-items:center;gap:8px;padding:8px 12px;border-radius:6px;font-size:12px;font-weight:600;color:var(--txt2);cursor:pointer;transition:.15s;width:100%;border:none;background:none;font-family:inherit}.nav-dd-item:hover{background:var(--brand-glow);color:var(--brand)}.nav-dd-item.danger{color:var(--danger)}.nav-dd-item.danger:hover{background:rgba(239,68,68,.1)}

.modal{background:var(--bg2);border:1px solid var(--brd2);border-radius:var(--rl);padding:32px;width:100%;max-width:420px;box-shadow:0 20px 60px rgba(0,0,0,.5);animation:fadeUp .3s ease;position:relative}

.hero-badge .dot{width:7px;height:7px;background:var(--accent);border-radius:50%;animation:pulse 2s infinite}@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.hero h1{font-size:clamp(30px,4.5vw,50px);font-weight:900;line-height:1.08;letter-spacing:-2px;margin-bottom:14px}
.hero p{font-size:16px;color:var(--txt2);line-height:1.7;margin-bottom:24px;max-width:460px}
.hero-btns{display:flex;gap:12px;flex-wrap:wrap}
.gradient-text{background:var(--grad);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.btn{display:inline-flex;align-items:center;gap:8px;padding:12px 24px;border-radius:10px;font-size:13px;font-weight:700;text-decoration:none;cursor:pointer;border:none;transition:.25s;font-family:inherit}
.btn-p{background:var(--grad);color:#fff;box-shadow:0 4px 20px var(--brand-glow)}.btn-p:hover{transform:translateY(-2px)}.btn-p:disabled{opacity:.5;cursor:not-allowed}
.btn-s{background:var(--bg3);color:var(--txt);border:1px solid var(--brd2)}.btn-s:hover{border-color:var(--brand);color:var(--brand)}
.btn-gold{background:linear-gradient(135deg,var(--warn),var(--danger));color:#fff}.btn-gold:hover{transform:translateY(-2px)}
.hero-right{display:flex;justify-content:center;animation:fadeUp .8s ease .15s both}.hero-svg{width:100%;max-width:460px}
@keyframes floatY{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}@keyframes floatY2{0%,100%{transform:translateY(0)}50%{transform:translateY(-12px)}}
.float1{animation:floatY 4s ease-in-out infinite}.float2{animation:floatY2 5s ease-in-out infinite .5s}
.pulse-ring{animation:pR 3s ease-in-out infinite}@keyframes pR{0%,100%{opacity:.2;r:60}50%{opacity:.5;r:70}}
.sec-label{font-size:11px;text-transform:uppercase;letter-spacing:3px;color:var(--brand);font-weight:700;margin-bottom:8px}

.sec-sub{font-size:15px;color:var(--txt2);max-width:480px;margin-bottom:36px}
.services{position:relative;z-index:1;padding:80px 24px}.serv-in{max-width:1200px;margin:0 auto}
.serv-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:12px}
.serv-card{background:var(--bg3);border:1px solid var(--brd);border-radius:14px;padding:16px 12px;cursor:pointer;transition:.25s;text-align:center;position:relative;overflow:hidden}

.form-group input:focus,.form-group select:focus,.form-group textarea:focus{border-color:var(--brand);box-shadow:0 0 0 3px var(--brand-glow)}

.price-card{background:var(--bg2);border:1px solid var(--brd);border-radius:var(--rl);padding:24px;box-shadow:0 8px 40px rgba(0,0,0,.3);position:sticky;top:80px}
.price-tag{font-size:34px;font-weight:900;letter-spacing:-2px;margin-bottom:2px}.price-tag span{font-size:14px;font-weight:500;color:var(--txt2)}

.chart{margin-bottom:18px}.chart p{font-size:9px;text-transform:uppercase;letter-spacing:1.5px;color:var(--txt3);font-weight:700;margin-bottom:8px}
.chart-row{display:flex;align-items:center;gap:6px;margin-bottom:6px}.chart-label{font-size:10px;color:var(--txt2);width:60px;text-align:right;flex-shrink:0}

.chart-bar{height:100%;border-radius:4px;display:flex;align-items:center;justify-content:flex-end;padding-right:6px;font-size:9px;font-weight:700;color:#fff}
.chart-bar.low{width:25%;background:linear-gradient(90deg,var(--accent),#34d399)}.chart-bar.mid{width:55%;background:linear-gradient(90deg,var(--brand),#22d3ee)}.chart-bar.high{width:85%;background:linear-gradient(90deg,var(--brand2),#a78bfa)}

.price-total{background:var(--bg);border-radius:var(--rs);padding:12px;margin-bottom:14px}.price-total .row{display:flex;justify-content:space-between;padding:3px 0;font-size:11px}.price-total .row.total{border-top:1px solid var(--brd2);margin-top:4px;padding-top:6px;font-weight:800;font-size:13px;color:var(--brand)}

.privacy{position:relative;z-index:1;padding:80px 24px}.priv-in{max-width:1200px;margin:0 auto;display:grid;grid-template-columns:1fr 1fr;gap:48px;align-items:center}

.priv-row{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--brd)}.priv-row:last-child{border-bottom:none}

.admin-overlay{position:fixed;inset:0;background:rgba(5,8,22,.92);backdrop-filter:blur(12px);z-index:2000;display:none;overflow-y:auto}.admin-overlay.show{display:block}
.admin-panel{max-width:900px;margin:30px auto;padding:24px;background:var(--bg2);border-radius:var(--rl);border:1px solid var(--brd)}

.admin-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:18px}.admin-stat{background:var(--bg);border-radius:var(--rs);padding:12px;text-align:center}.admin-stat .num{font-size:22px;font-weight:900;color:var(--brand)}.admin-stat .lbl{font-size:9px;color:var(--txt3);text-transform:uppercase;letter-spacing:1px;font-weight:600}

.no-data{text-align:center;padding:30px;color:var(--txt3);font-size:12px}
.admin-badge{display:inline-flex;padding:2px 7px;border-radius:50px;font-size:9px;font-weight:700;background:var(--brand-glow);color:var(--brand)}

.sb-home{width:100%;padding:8px;background:var(--brand-glow);color:var(--brand);border:1px solid rgba(6,182,212,.2);border-radius:var(--rs);font-size:10px;font-weight:700;cursor:pointer;font-family:inherit;transition:.3s;display:flex;align-items:center;justify-content:center;gap:5px;margin-bottom:6px}.sb-home:hover{background:var(--brand);color:#fff}
.sb-logout{width:100%;padding:8px;border:1px solid var(--brd2);background:none;color:var(--txt3);border-radius:var(--rs);font-size:10px;font-weight:600;cursor:pointer;font-family:inherit;transition:.2s;display:flex;align-items:center;justify-content:center;gap:5px}.sb-logout:hover{border-color:var(--danger);color:var(--danger)}
.dash-main{padding:20px 24px;overflow-y:auto}.dash-panel{display:none;animation:fadeUp .35s ease}.dash-panel.active{display:block}
.panel-header{margin-bottom:24px}.panel-header h2{font-size:22px;font-weight:900;letter-spacing:-.5px;margin-bottom:3px}.panel-header p{font-size:12px;color:var(--txt3)}
.stats-row{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:20px}
.stat-card{background:var(--bg2);border:1px solid var(--brd);border-radius:12px;padding:14px;position:relative;overflow:hidden;transition:.25s}
.stat-card:hover{border-color:rgba(6,182,212,.2);transform:translateY(-1px)}
.stat-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;opacity:.8}
